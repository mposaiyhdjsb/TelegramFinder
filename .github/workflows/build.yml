name: Build Telegram Finder Clipboard APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/example/telegramfinder
          mkdir -p app/src/main/res/values

          cat > settings.gradle << 'ENDOFFILE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "TelegramFinder"
          include ':app'
          ENDOFFILE

          cat > build.gradle << 'ENDOFFILE'
          plugins {
              id 'com.android.application' version '8.1.1' apply false
          }
          ENDOFFILE

          cat > app/build.gradle << 'ENDOFFILE'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.telegramfinder'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.telegramfinder"
                  minSdk 24
                  targetSdk 34
                  versionCode 2
                  versionName "2.0 Clipboard"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          ENDOFFILE

          cat > app/src/main/AndroidManifest.xml << 'ENDOFFILE'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />

              <application
                  android:allowBackup="true"
                  android:label="ID Finder"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <service
                      android:name=".ClipboardService"
                      android:exported="false"
                      android:foregroundServiceType="dataSync" />
              </application>
          </manifest>
          ENDOFFILE

          cat > app/src/main/java/com/example/telegramfinder/MainActivity.java << 'ENDOFFILE'
          package com.example.telegramfinder;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.Settings;
          import android.widget.Button;
          import android.widget.LinearLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  LinearLayout layout = new LinearLayout(this);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setPadding(50, 50, 50, 50);

                  TextView infoText = new TextView(this);
                  infoText.setText("اپلیکیشن آماده است.\nفایل contacts_fast.db باید در پوشه Downloads باشد.");
                  infoText.setPadding(0, 0, 0, 50);

                  Button btnPermission = new Button(this);
                  btnPermission.setText("درخواست دسترسی به فایل‌ها (اجباری)");
                  btnPermission.setOnClickListener(v -> requestStoragePermission());

                  Button btnCheck = new Button(this);
                  btnCheck.setText("بررسی کلیپ‌بورد الان");
                  btnCheck.setOnClickListener(v -> checkCurrentClipboard());

                  Button btnService = new Button(this);
                  btnService.setText("روشن کردن سرویس پس‌زمینه");
                  btnService.setOnClickListener(v -> {
                      Intent serviceIntent = new Intent(this, ClipboardService.class);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(serviceIntent);
                      } else {
                          startService(serviceIntent);
                      }
                      Toast.makeText(this, "سرویس شروع شد", Toast.LENGTH_SHORT).show();
                  });

                  layout.addView(infoText);
                  layout.addView(btnPermission);
                  layout.addView(btnCheck);
                  layout.addView(btnService);
                  setContentView(layout);
              }

              private void requestStoragePermission() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      if (!Environment.isExternalStorageManager()) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION);
                          intent.setData(Uri.parse("package:" + getPackageName()));
                          startActivity(intent);
                      } else {
                          Toast.makeText(this, "دسترسی قبلاً داده شده", Toast.LENGTH_SHORT).show();
                      }
                  }
              }

              private void checkCurrentClipboard() {
                  ClipboardManager clipboard = (ClipboardManager) getSystemService(Context.CLIPBOARD_SERVICE);
                  if (clipboard.hasPrimaryClip() && clipboard.getPrimaryClip().getItemCount() > 0) {
                      CharSequence text = clipboard.getPrimaryClip().getItemAt(0).getText();
                      if (text != null) {
                          ClipboardService.processText(this, text.toString().trim());
                      } else {
                          Toast.makeText(this, "کلیپ‌بورد خالی یا غیر متنی است", Toast.LENGTH_SHORT).show();
                      }
                  } else {
                      Toast.makeText(this, "کلیپ‌بورد خالی است", Toast.LENGTH_SHORT).show();
                  }
              }
          }
          ENDOFFILE

          cat > app/src/main/java/com/example/telegramfinder/ClipboardService.java << 'ENDOFFILE'
          package com.example.telegramfinder;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.database.Cursor;
          import android.database.sqlite.SQLiteDatabase;
          import android.os.Build;
          import android.os.Environment;
          import android.os.IBinder;
          import android.util.Log;
          import java.io.File;

          public class ClipboardService extends Service {
              private static final String TAG = "ClipboardService";
              private static final String CHANNEL_SERVICE = "service_channel";
              private static final String CHANNEL_RESULT  = "result_channel";
              private ClipboardManager clipboardManager;
              private ClipboardManager.OnPrimaryClipChangedListener listener;

              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannels();

                  clipboardManager = (ClipboardManager) getSystemService(CLIPBOARD_SERVICE);
                  listener = () -> {
                      if (clipboardManager.hasPrimaryClip()
                              && clipboardManager.getPrimaryClip().getItemCount() > 0) {
                          CharSequence text = clipboardManager.getPrimaryClip().getItemAt(0).getText();
                          if (text != null) {
                              processText(this, text.toString().trim());
                          }
                      }
                  };
                  clipboardManager.addPrimaryClipChangedListener(listener);
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  Notification notification = new Notification.Builder(this, CHANNEL_SERVICE)
                      .setContentTitle("ID Finder فعال است")
                      .setContentText("در حال پایش کلیپ‌بورد...")
                      .setSmallIcon(android.R.drawable.ic_menu_search)
                      .build();
                  startForeground(1, notification);
                  return START_STICKY;
              }

              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (clipboardManager != null && listener != null) {
                      clipboardManager.removePrimaryClipChangedListener(listener);
                  }
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }

              private void createNotificationChannels() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationManager nm = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                      nm.createNotificationChannel(new NotificationChannel(
                          CHANNEL_SERVICE, "سرویس پس‌زمینه", NotificationManager.IMPORTANCE_LOW));
                      nm.createNotificationChannel(new NotificationChannel(
                          CHANNEL_RESULT, "نتایج جستجو", NotificationManager.IMPORTANCE_HIGH));
                  }
              }

              public static void processText(Context context, String text) {
                  if (text.matches("^[0-9]{8,10}$")) {
                      searchInDatabase(context, text);
                  }
              }

              private static void searchInDatabase(Context context, String id) {
                  SQLiteDatabase db = null;
                  try {
                      File dbFile = new File(
                          Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS),
                          "contacts_fast.db"
                      );
                      if (!dbFile.exists()) {
                          showNotification(context, "خطا", "فایل contacts_fast.db در دانلودها یافت نشد.");
                          return;
                      }
                      db = SQLiteDatabase.openDatabase(
                          dbFile.getAbsolutePath(), null, SQLiteDatabase.OPEN_READONLY
                      );
                      Cursor cursor = db.rawQuery(
                          "SELECT colPhone FROM contacts WHERE colId = ?", new String[]{id}
                      );
                      if (cursor.moveToFirst()) {
                          String phone = cursor.getString(0);
                          showNotification(context, "یافت شد! 🎉", "کد: " + id + "\nشماره: " + phone);
                      } else {
                          showNotification(context, "نتیجه‌ای یافت نشد",
                              "برای کد " + id + " شماره‌ای وجود ندارد.");
                      }
                      cursor.close();
                  } catch (Exception e) {
                      Log.e(TAG, "Database error", e);
                      showNotification(context, "خطای دیتابیس", e.getMessage());
                  } finally {
                      if (db != null && db.isOpen()) db.close();
                  }
              }

              private static void showNotification(Context context, String title, String message) {
                  NotificationManager nm =
                      (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);

                  Notification notification = new Notification.Builder(context, "result_channel")
                      .setContentTitle(title)
                      .setContentText(message)
                      .setStyle(new Notification.BigTextStyle().bigText(message))
                      .setSmallIcon(android.R.drawable.ic_menu_search)
                      .setAutoCancel(true)
                      .build();

                  nm.notify((int) System.currentTimeMillis(), notification);
              }
          }
          ENDOFFILE

      - name: Build APK with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ID-Finder-Clipboard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
