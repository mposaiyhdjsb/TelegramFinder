name: Build Telegram Finder APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/example/telegramfinder
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values

          # --- Project build.gradle ---
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.1.1"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # --- settings.gradle ---
          cat << 'EOF' > settings.gradle
          rootProject.name = "Telegram Finder"
          include ':app'
          EOF

          # --- App build.gradle ---
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.example.telegramfinder'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.telegramfinder"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # --- AndroidManifest.xml ---
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              
              <application android:allowBackup="true" android:label="Telegram Finder" android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
                  <service android:name=".TrackerService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessconfig" />
                  </service>
              </application>
          </manifest>
          EOF

          # --- accessconfig.xml ---
          cat << 'EOF' > app/src/main/res/xml/accessconfig.xml
          <?xml version="1.0" encoding="utf-8"?>
          <accessibility-service xmlns:android="http://schemas.android.com/apk/res/android"
              android:accessibilityEventTypes="typeWindowStateChanged|typeWindowContentChanged"
              android:accessibilityFeedbackType="feedbackSpoken"
              android:accessibilityFlags="flagDefault|flagRetrieveInteractiveWindows"
              android:canRetrieveWindowContent="true"
              android:packageNames="org.telegram.plus"
              android:notificationTimeout="100" />
          EOF

          # --- MainActivity.java ---
          cat << 'EOF' > app/src/main/java/com/example/telegramfinder/MainActivity.java
          package com.example.telegramfinder;
          import android.content.Intent;
          import android.os.Bundle;
          import android.provider.Settings;
          import android.widget.Button;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Button btn = new Button(this);
                  btn.setText("Enable Accessibility Service");
                  btn.setOnClickListener(v -> {
                      Intent intent = new Intent(Settings.ACTION_ACCESSIBILITY_SETTINGS);
                      startActivity(intent);
                  });
                  setContentView(btn);
              }
          }
          EOF

          # --- TrackerService.java ---
          cat << 'EOF' > app/src/main/java/com/example/telegramfinder/TrackerService.java
          package com.example.telegramfinder;
          import android.accessibilityservice.AccessibilityService;
          import android.view.accessibility.AccessibilityEvent;
          import android.view.accessibility.AccessibilityNodeInfo;
          import android.util.Log;
          import android.os.Environment;
          import android.database.sqlite.SQLiteDatabase;
          import android.database.Cursor;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.content.Context;
          import android.os.Build;
          import java.io.File;

          public class TrackerService extends AccessibilityService {
              private static final String TAG = "TrackerService";
              private String lastCheckedId = "";
              private SQLiteDatabase db;

              @Override
              protected void onServiceConnected() {
                  super.onServiceConnected();
                  try {
                      File dbFile = new File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS), "contacts_fast.db");
                      if(dbFile.exists()) {
                          db = SQLiteDatabase.openDatabase(dbFile.getAbsolutePath(), null, SQLiteDatabase.OPEN_READONLY);
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "Error opening database", e);
                  }
              }

              @Override
              public void onAccessibilityEvent(AccessibilityEvent event) {
                  AccessibilityNodeInfo root = getRootInActiveWindow();
                  if (root == null) return;
                  findTelegramId(root);
              }

              private void findTelegramId(AccessibilityNodeInfo node) {
                  if (node.getText() != null) {
                          String text = node.getText().toString();
                          // پیدا کردن آیدی‌های عددی
                          if (text.matches("\\d+") && text.length() > 5) { 
                              if (!text.equals(lastCheckedId)) {
                                  lastCheckedId = text;
                                  searchInDatabase(text);
                              }
                          }
                  }
                  for (int i = 0; i < node.getChildCount(); i++) {
                      AccessibilityNodeInfo child = node.getChild(i);
                      if (child != null) {
                          findTelegramId(child);
                          child.recycle();
                      }
                  }
              }

              private void searchInDatabase(String id) {
                  if (db == null || !db.isOpen()) return;
                  try {
                      Cursor cursor = db.rawQuery("SELECT colPhone FROM contacts WHERE colId = ?", new String[]{id});
                      if (cursor.moveToFirst()) {
                          String phone = cursor.getString(0);
                          showNotification(id, phone);
                      }
                      cursor.close();
                  } catch (Exception e) {
                      Log.e(TAG, "Database query error", e);
                  }
              }

              private void showNotification(String id, String phone) {
                  NotificationManager nm = (NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE);
                  String channelId = "telegram_finder_channel";
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(channelId, "Finder", NotificationManager.IMPORTANCE_HIGH);
                      nm.createNotificationChannel(channel);
                  }
                  Notification.Builder builder = null;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      builder = new Notification.Builder(this, channelId);
                  } else {
                      builder = new Notification.Builder(this);
                  }
                  builder.setContentTitle("Target Found!")
                         .setContentText("ID: " + id + " | Phone: " + phone)
                         .setSmallIcon(android.R.drawable.ic_dialog_info)
                         .setAutoCancel(true);
                  nm.notify((int)System.currentTimeMillis(), builder.build());
              }

              @Override
              public void onInterrupt() {}
              
              @Override
              public void onDestroy() {
                  super.onDestroy();
                  if (db != null && db.isOpen()) {
                      db.close();
                  }
              }
          }
          EOF

          # --- Setup Gradle Wrapper ---
          mkdir -p gradle/wrapper
          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-bin.zip
          networkTimeout=10000
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradlew
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TelegramFinder-APK
          path: app/build/outputs/apk/debug/app-debug.apk

